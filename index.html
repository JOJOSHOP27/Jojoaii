<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FT RAMOT SESI 19.00 WIB</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        /* ===== TAMPILAN PERSIS SEPERTI GAMBAR, TIDAK DIUBAH ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e6e9ef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        #capture-area {
            background: white;
            width: fit-content;
            max-width: 100%;
            margin: 0 auto;
            padding: 25px 30px 30px 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        .tournament-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            margin-bottom: 28px;
        }

        .tournament-table caption {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 1px;
            color: #1e2f2a;
            caption-side: top;
        }

        .tournament-table th, 
        .tournament-table td {
            border: 1.2px solid #000000;
            padding: 8px 10px;
            vertical-align: middle;
        }

        .tournament-table th {
            background-color: #d9e1e8;
            font-weight: 700;
            text-align: center;
        }

        .tournament-table .sub-header {
            background-color: #eef2f5;
            font-weight: 600;
        }

        .tournament-table td {
            text-align: center;
        }

        .tournament-table td:first-child {
            text-align: left;
            font-weight: 500;
            background-color: #fefefe;
        }

        .total-kill-cell,
        .total-point-cell,
        .rank-cell {
            background-color: #f8f5e6;
            font-weight: 600;
        }

        .juara-wrapper {
            margin-top: 20px;
            border: 1px solid #000;
            width: 100%;
            background: white;
        }

        .juara-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
        }

        .juara-table caption {
            font-size: 18px;
            font-weight: bold;
            text-align: left;
            background-color: #d9e1e8;
            padding: 8px 12px;
            border: 1px solid #000;
            border-bottom: none;
            caption-side: top;
        }

        .juara-table th, 
        .juara-table td {
            border: 1px solid #000000;
            padding: 8px 12px;
            text-align: left;
        }

        .juara-table th {
            background-color: #eef2f5;
            font-weight: 700;
        }

        .juara-table td:first-child {
            font-weight: 600;
        }

        .juara-table td:last-child {
            text-align: center;
            font-weight: bold;
        }

        .btn-download {
            display: block;
            margin: 25px auto 0 auto;
            background-color: #2c7a4d;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            font-family: inherit;
            text-align: center;
        }

        .btn-download:hover {
            background-color: #1f5e3a;
            transform: scale(1.02);
        }

        .table-responsive {
            overflow-x: auto;
        }

        [data-editable], [data-podium] {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center;">
    <div id="capture-area">
        <div class="table-responsive">
            <table class="tournament-table" id="mainTable">
                <caption>FT RAMOT SESI 19.00 WIB</caption>
                <thead>
                    <tr>
                        <th rowspan="2">NICKNAME</th>
                        <th colspan="3">MATCH 1</th>
                        <th colspan="3">MATCH 2</th>
                        <th colspan="3">MATCH 3</th>
                        <th colspan="3">TOTAL</th>
                    </tr>
                    <tr class="sub-header">
                        <th>PLACE</th><th>KILL</th><th>POINT</th>
                        <th>PLACE</th><th>KILL</th><th>POINT</th>
                        <th>PLACE</th><th>KILL</th><th>POINT</th>
                        <th>KILL</th><th>POINT</th><th>RANK</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="juara-wrapper">
            <table class="juara-table" id="juaraTable">
                <caption>JUARA</caption>
                <thead>
                    <tr><th>JUARA</th><th>NICKNAME</th><th>POINT</th></tr>
                </thead>
                <tbody id="juaraBody">
                    <tr><td>Juara 1</td><td data-podium="nick" data-rank="0">-</td><td>-</td><tr>
                    <tr><td>Juara 2</td><td data-podium="nick" data-rank="1">-</td><td>-</td></tr>
                    <tr><td>Juara 3</td><td data-podium="nick" data-rank="2">-</td><td>-</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <button class="btn-download" id="downloadPNGButton">📸 Download sebagai PNG</button>
</div>

<script>
    // Data awal persis gambar
    let teams = [
        { nickname: "BARUDAK BAPAK", matches: [[9,13], [8,6], [6,17]] },
        { nickname: "frezzwashere", matches: [[4,4], [9,11], [12,14]] },
        { nickname: "LUPI JUSTICE", matches: [[12,14], [4,2], [8,8]] },
        { nickname: "JPN2", matches: [[6,1], [12,12], [9,7]] },
        { nickname: "Spontan", matches: [[8,19], [1,7], [2,10]] },
        { nickname: "SAUYUNAN ID", matches: [[5,10], [6,8], [5,8]] },
        { nickname: "VOLDAREZ", matches: [[7,2], [3,7], [4,3]] },
        { nickname: "Jumidi RSCL", matches: [[2,1], [7,10], [0,3]] },
        { nickname: "STARHIGH NEW", matches: [[0,3], [2,3], [3,7]] },
        { nickname: "SMAGAPRO", matches: [[3,6], [0,1], [1,6]] },
        { nickname: "esukibri", matches: [[0,0], [5,4], [0,4]] },
        { nickname: "LAST SALDO", matches: [[1,7], [0,1], [0,0]] }
    ];

    function calcStats(team) {
        let totalKill = 0, totalPoint = 0;
        let matchPoints = [];
        for (let i = 0; i < team.matches.length; i++) {
            let place = team.matches[i][0];
            let kill = team.matches[i][1];
            let point = place + kill;
            matchPoints.push(point);
            totalKill += kill;
            totalPoint += point;
        }
        return { matchPoints, totalKill, totalPoint };
    }

    function getRankingsAndPodium() {
        let withStats = teams.map((team, idx) => {
            let s = calcStats(team);
            return { idx, nickname: team.nickname, totalPoint: s.totalPoint, totalKill: s.totalKill };
        });
        withStats.sort((a,b) => {
            if (a.totalPoint !== b.totalPoint) return b.totalPoint - a.totalPoint;
            return b.totalKill - a.totalKill;
        });
        let rankMap = new Array(teams.length);
        for (let i = 0; i < withStats.length; i++) rankMap[withStats[i].idx] = i+1;
        let podium = withStats.slice(0,3).map(p => ({ originalIdx: p.idx, nickname: p.nickname, point: p.totalPoint }));
        return { rankMap, podium };
    }

    function renderAll() {
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        const { rankMap, podium } = getRankingsAndPodium();
        let html = '';
        for (let i = 0; i < teams.length; i++) {
            const team = teams[i];
            const stats = calcStats(team);
            html += '<tr>';
            html += `<td data-editable="nick" data-row="${i}">${escapeHtml(team.nickname)}</td>`;
            for (let m = 0; m < 3; m++) {
                let place = team.matches[m][0];
                let kill = team.matches[m][1];
                html += `<td data-editable="place" data-row="${i}" data-match="${m}">${place}</td>`;
                html += `<td data-editable="kill" data-row="${i}" data-match="${m}">${kill}</td>`;
                html += `<td>${stats.matchPoints[m]}</td>`;
            }
            html += `<td class="total-kill-cell">${stats.totalKill}</td>`;
            html += `<td class="total-point-cell">${stats.totalPoint}</td>`;
            html += `<td class="rank-cell">${rankMap[i]}</td>`;
            html += '</tr>';
        }
        tbody.innerHTML = html;

        const juaraBody = document.getElementById('juaraBody');
        if (juaraBody) {
            let juaraHtml = '';
            const titles = ['Juara 1', 'Juara 2', 'Juara 3'];
            for (let i = 0; i < 3; i++) {
                let nick = podium[i] ? podium[i].nickname : '-';
                let pts = podium[i] ? podium[i].point : '-';
                let originalIdx = podium[i] ? podium[i].originalIdx : -1;
                juaraHtml += `<tr>
                    <td>${titles[i]}</td>
                    <td data-podium="nick" data-rank="${i}" data-original-idx="${originalIdx}">${escapeHtml(nick)}</td>
                    <td>${pts}</td>
                </tr>`;
            }
            juaraBody.innerHTML = juaraHtml;
        }

        attachEditEvents();
        attachPodiumEditEvents();
    }

    // Event click (satu klik) untuk edit di tabel utama
    function attachEditEvents() {
        document.querySelectorAll('[data-editable="nick"]').forEach(el => {
            el.removeEventListener('click', nickEdit);
            el.addEventListener('click', nickEdit);
        });
        document.querySelectorAll('[data-editable="place"], [data-editable="kill"]').forEach(el => {
            el.removeEventListener('click', placeKillEdit);
            el.addEventListener('click', placeKillEdit);
        });
    }

    function attachPodiumEditEvents() {
        document.querySelectorAll('[data-podium="nick"]').forEach(el => {
            el.removeEventListener('click', podiumNickEdit);
            el.addEventListener('click', podiumNickEdit);
        });
    }

    function nickEdit(e) {
        e.stopPropagation();
        const row = parseInt(e.currentTarget.getAttribute('data-row'));
        const old = teams[row].nickname;
        let newVal = prompt("Edit Nama Tim:", old);
        if (newVal && newVal.trim() !== "") {
            teams[row].nickname = newVal.trim();
            renderAll();
        }
    }

    function placeKillEdit(e) {
        e.stopPropagation();
        const cell = e.currentTarget;
        const row = parseInt(cell.getAttribute('data-row'));
        const match = parseInt(cell.getAttribute('data-match'));
        const type = cell.getAttribute('data-editable');
        const oldVal = teams[row].matches[match][type === 'place' ? 0 : 1];
        let newVal = prompt(`Edit ${type.toUpperCase()} Match ${match+1}:`, oldVal);
        if (newVal !== null) {
            let num = parseInt(newVal);
            if (isNaN(num)) num = 0;
            if (num < 0) num = 0;
            teams[row].matches[match][type === 'place' ? 0 : 1] = num;
            renderAll();
        }
    }

    function podiumNickEdit(e) {
        e.stopPropagation();
        const cell = e.currentTarget;
        const rankPos = parseInt(cell.getAttribute('data-rank'));
        let originalIdx = parseInt(cell.getAttribute('data-original-idx'));
        if (isNaN(originalIdx) || originalIdx < 0) {
            const { podium } = getRankingsAndPodium();
            if (podium[rankPos]) originalIdx = podium[rankPos].originalIdx;
            else return;
        }
        const oldNick = teams[originalIdx].nickname;
        let newVal = prompt("Edit Nama Tim di Podium:", oldNick);
        if (newVal && newVal.trim() !== "") {
            teams[originalIdx].nickname = newVal.trim();
            renderAll();
        }
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function downloadPNG() {
        const btn = document.getElementById('downloadPNGButton');
        const area = document.getElementById('capture-area');
        btn.textContent = '⏳ Memproses...';
        btn.disabled = true;
        try {
            const canvas = await html2canvas(area, {
                scale: 2.5,
                backgroundColor: '#ffffff',
                logging: false,
                windowWidth: area.scrollWidth,
                windowHeight: area.scrollHeight
            });
            const link = document.createElement('a');
            link.download = 'FT_RAMOT_Turnamen.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (err) {
            console.error(err);
            alert('Gagal membuat PNG.');
        } finally {
            btn.textContent = '📸 Download sebagai PNG';
            btn.disabled = false;
        }
    }

    renderAll();
    document.getElementById('downloadPNGButton').addEventListener('click', downloadPNG);
</script>
</body>
</html>
