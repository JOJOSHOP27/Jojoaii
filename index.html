<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Gambar ke URL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0d14;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(26, 32, 44, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        }
        .logo {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: #f0f4ff;
            margin-bottom: 4px;
        }
        .logo span {
            background: linear-gradient(135deg, #4d7bfd, #7aa2f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            text-align: center;
            color: #6b7e9e;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .dropzone {
            border: 2px dashed rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }
        .dropzone:hover,
        .dropzone.dragover {
            border-color: #4d7bfd;
            background: rgba(77, 123, 253, 0.06);
        }
        .dropzone .icon {
            font-size: 44px;
            display: block;
            margin-bottom: 10px;
        }
        .dropzone p {
            color: #b0c4de;
            font-size: 15px;
        }
        .dropzone .types {
            color: #6b7e9e;
            font-size: 12px;
            margin-top: 6px;
        }
        .file-info {
            display: none;
            text-align: center;
            padding: 10px;
            background: rgba(77, 123, 253, 0.08);
            border-radius: 10px;
            margin-top: 12px;
            color: #f0f4ff;
            font-weight: 500;
            border: 1px solid rgba(77, 123, 253, 0.15);
        }
        .file-info.show {
            display: block;
        }
        .btn-upload {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(135deg, #4d7bfd, #7aa2f7);
            border: none;
            border-radius: 60px;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-upload:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 32px rgba(77, 123, 253, 0.3);
        }
        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .progress {
            display: none;
            margin-top: 14px;
        }
        .progress.show {
            display: block;
        }
        .progress-bar {
            height: 5px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4d7bfd, #7aa2f7);
            transition: width 0.3s ease;
        }
        .progress-text {
            color: #6b7e9e;
            font-size: 13px;
            margin-top: 4px;
            text-align: center;
        }
        .result {
            display: none;
            margin-top: 16px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .result.show {
            display: block;
        }
        .result .label {
            color: #6b7e9e;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .result .url-box {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 3px 3px 3px 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .result .url-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4ff;
            font-size: 13px;
            padding: 8px 0;
            font-family: monospace;
            min-width: 0;
        }
        .result .url-box .copy {
            padding: 6px 16px;
            background: #4d7bfd;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s ease;
            white-space: nowrap;
        }
        .result .url-box .copy:hover {
            background: #7aa2f7;
        }
        .result .preview {
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            max-height: 250px;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
        }
        .result .preview img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
        }
        .status {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #6b7e9e;
        }
        .status.success {
            color: #00b894;
        }
        .status.error {
            color: #ef4444;
        }
        .footer {
            text-align: center;
            margin-top: 18px;
            color: #6b7e9e;
            font-size: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 14px;
        }
        .footer a {
            color: #4d7bfd;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">📸 <span>Upload to URL</span></div>
    <p class="sub">Unggah gambar & dapatkan link permanen</p>

    <div class="dropzone" id="dropzone">
        <span class="icon">☁️</span>
        <p>Klik atau seret gambar ke sini</p>
        <span class="types">PNG · JPG · WEBP · GIF · Maks 10 MB</span>
    </div>

    <div class="file-info" id="fileInfo">📎 <span id="fileName"></span></div>

    <button class="btn-upload" id="uploadBtn">⬆ Upload</button>

    <div class="progress" id="progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">Mengupload...</div>
    </div>

    <div class="result" id="result">
        <div class="label">🔗 Link Gambar</div>
        <div class="url-box">
            <input type="text" id="urlResult" readonly />
            <button class="copy" id="copyBtn">Salin</button>
        </div>
        <div class="preview" id="preview"></div>
    </div>

    <div class="status" id="status"></div>

    <div class="footer">
        <a href="#" target="_blank">Powered by FreeImage</a>
    </div>
</div>

<script>
    // ============================================================
    // 🔑 API KEY — Diambil dari file DinzID.js
    // ============================================================
    const FREEIMAGE_API_KEY = '6d207e02198a847aa98d0a2a901485a5';
    const FREEIMAGE_URL = 'https://freeimage.host/api/1/upload';

    // ============================================================
    // DOM Elements
    // ============================================================
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const uploadBtn = document.getElementById('uploadBtn');
    const progress = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const resultDiv = document.getElementById('result');
    const urlResult = document.getElementById('urlResult');
    const copyBtn = document.getElementById('copyBtn');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');

    let selectedFile = null;

    // ============================================================
    // Event: Klik dropzone
    // ============================================================
    dropzone.addEventListener('click', () => fileInput.click());

    // ============================================================
    // Event: Pilih file via input
    // ============================================================
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            selectedFile = e.target.files[0];
            showFileInfo(selectedFile);
        }
    });

    // ============================================================
    // Event: Drag & Drop
    // ============================================================
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            selectedFile = e.dataTransfer.files[0];
            showFileInfo(selectedFile);
        }
    });

    // ============================================================
    // Show file info
    // ============================================================
    function showFileInfo(file) {
        const size = (file.size / 1024 / 1024).toFixed(2);
        fileName.textContent = `${file.name} (${size} MB)`;
        fileInfo.classList.add('show');
        status.textContent = '';
        status.className = 'status';
        resultDiv.classList.remove('show');
        preview.innerHTML = '';
    }

    // ============================================================
    // Upload ke FreeImage
    // ============================================================
    uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) {
            status.textContent = '⚠️ Pilih gambar dulu!';
            status.className = 'status error';
            return;
        }

        if (selectedFile.size > 10 * 1024 * 1024) {
            status.textContent = '❌ Maksimal 10 MB!';
            status.className = 'status error';
            return;
        }

        // Disable button
        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '⏳ Uploading...';

        // Show progress
        progress.classList.add('show');
        progressFill.style.width = '0%';
        progressText.textContent = 'Mengupload 0%';
        status.textContent = '';
        status.className = 'status';

        try {
            const formData = new FormData();
            formData.append('source', selectedFile);
            formData.append('key', FREEIMAGE_API_KEY);

            const xhr = new XMLHttpRequest();

            // Progress
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressFill.style.width = percent + '%';
                    progressText.textContent = `Mengupload ${percent}%`;
                }
            });

            // Promise wrapper
            const response = await new Promise((resolve, reject) => {
                xhr.open('POST', FREEIMAGE_URL, true);

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        resolve(xhr.responseText);
                    } else {
                        reject(new Error(`HTTP ${xhr.status}`));
                    }
                };

                xhr.onerror = () => reject(new Error('Network Error'));
                xhr.send(formData);
            });

            // Parse response
            const json = JSON.parse(response);

            if (json.success && json.image && json.image.url) {
                const url = json.image.url;

                // Tampilkan hasil
                urlResult.value = url;
                resultDiv.classList.add('show');
                preview.innerHTML = `<img src="${url}" alt="Preview" />`;
                status.textContent = '✅ Upload berhasil!';
                status.className = 'status success';

                // Reset file
                selectedFile = null;
                fileInput.value = '';
                fileInfo.classList.remove('show');

                // Copy otomatis
                navigator.clipboard?.writeText(url).catch(() => {});
            } else {
                throw new Error(json.error || 'Upload gagal');
            }

        } catch (err) {
            status.textContent = `❌ Error: ${err.message}`;
            status.className = 'status error';
            console.error(err);
        }

        // Reset button & progress
        uploadBtn.disabled = false;
        uploadBtn.innerHTML = '⬆ Upload';
        progress.classList.remove('show');
        progressFill.style.width = '0%';
    });

    // ============================================================
    // Copy link
    // ============================================================
    copyBtn.addEventListener('click', () => {
        if (urlResult.value) {
            navigator.clipboard.writeText(urlResult.value).then(() => {
                copyBtn.textContent = '✅ Tersalin!';
                setTimeout(() => copyBtn.textContent = 'Salin', 2000);
            }).catch(() => {
                urlResult.select();
                document.execCommand('copy');
                copyBtn.textContent = '✅ Tersalin!';
                setTimeout(() => copyBtn.textContent = 'Salin', 2000);
            });
        }
    });

    // ============================================================
    // Keyboard shortcut: Escape untuk reset
    // ============================================================
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            resultDiv.classList.remove('show');
            preview.innerHTML = '';
            status.textContent = '';
            status.className = 'status';
            urlResult.value = '';
        }
    });
</script>

</body>
</html>
